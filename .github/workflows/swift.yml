name: Build and Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Numéro de version de l''application'
        required: true
        default: '1.0.0' # Vous pouvez définir une valeur par défaut ici

jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub Action for SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1

  VersionUp:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yanamura/ios-bump-version@v1
        with:
          version: ${{ github.event.inputs.version }}
          build-number: ${{github.run_number}}

  Build:
    runs-on: macos-13
    needs: [SwiftLint, VersionUp]

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          pod install --repo-update
        shell: bash

      - name: Clean
        run: |
          xcodebuild clean -workspace MuscleUp.xcworkspace -scheme MuscleUp

      - name: Build
        run: |
          xcodebuild build -workspace MuscleUp.xcworkspace -scheme MuscleUp -sdk iphoneos CODE_SIGNING_ALLOWED=No

      - name: Run tests
        run: |
          xcodebuild test -workspace MuscleUp.xcworkspace -scheme MuscleUp -sdk iphoneos -destination "platform=iOS Simulator,name=iPhone 15 Pro Max" CODE_SIGNING_ALLOWED=No
