name: Build and Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numéro de version de l'application"
        required: true
        default: "1.0.0" # Vous pouvez définir une valeur par défaut ici

jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub Action for SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        
  Build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@65540b95f51493d65f5e59e97dcef9629ddf11bf
        with:
          swift-version: "5.3.3"
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test
