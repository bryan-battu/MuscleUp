name: Build and Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numéro de version de l'application"
        required: true
        default: "1.0.0"

jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub Action for SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1

  Build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Set Build Number
        run: echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> $GITHUB_ENV
      - name: Setup Swift
        uses: swift-actions/setup-swift@65540b95f51493d65f5e59e97dcef9629ddf11bf
        with:
          swift-version: "5.3.3"
      - name: Update Version
        run: |
          sed -i '' 's/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = "${{ github.event.inputs.version }}";/' MuscleUp.xcodeproj/project.pbxproj
          sed -i '' 's/BUILD_NUMBER = .*;/BUILD_NUMBER = "${{ github.run_number }}";/' MuscleUp.xcodeproj/project.pbxproj
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update version to ${{ github.event.inputs.version }} and build to ${{ github.run_number }}"
          git tag ${{ github.event.inputs.version }}
          git push --follow-tags --set-upstream origin ${{ github.ref }}
      - name: Build
        run: |
          xcodebuild build -workspace MuscleUp.xcworkspace -scheme MuscleUp -sdk iphoneos CODE_SIGNING_ALLOWED=No
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: DerivedData/**/*.app
