name: Build and Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numéro de version de l'application"
        required: true
        default: "1.0.0"

jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub Action for SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        
  Build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@65540b95f51493d65f5e59e97dcef9629ddf11bf
        with:
          swift-version: "5.3.3"
      - name: Build
        run: |
          xcodebuild build -workspace MuscleUp.xcworkspace -scheme MuscleUp -sdk iphoneos CODE_SIGNING_ALLOWED=No
      - name: Run tests
        run: xcodebuild -scheme MuscleUp -destination 'platform=iOS' test
        
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: DerivedData/**/*.app
