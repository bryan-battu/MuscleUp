name: Swift

on:
  push:
    branches: ["main"]

jobs:
  SwiftLint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: GitHub Action for SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1

      - name: Send Teams Message on Success
        if: success()
        uses: ad-m/ad-msteams-message@v1
        with:
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: "SwiftLint Success on ${{ github.repository }}"
          summary: "SwiftLint has successfully run on the repository ${{ github.repository }}."

  Build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install Dependencies
      run: |
        pod install --repo-update
      shell: bash

    - name: Clean
      run: |
        xcodebuild clean -workspace MuscleUp.xcworkspace -scheme MuscleUp

    - name: Build
      run: |
        xcodebuild build -workspace MuscleUp.xcworkspace -scheme MuscleUp -sdk iphoneos CODE_SIGNING_ALLOWED=No

    - name: Run tests
      run: |
        xcodebuild test -workspace MuscleUp.xcworkspace -scheme MuscleUp -sdk iphoneos -destination "platform=iOS Simulator,OS=17.3,name=iPhone 15 Pro Max" CODE_SIGNING_ALLOWED=No
